AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Strata Platform — Cross-account IAM roles for Strata cluster provisioning.
  Deploy this stack exactly once in your AWS account. It creates two IAM roles
  that allow the Strata platform to provision and monitor EKS clusters on your
  behalf. No IAM users or long-lived access keys are created.

Parameters:
  StrataAccountId:
    Type: String
    Default: "STRATA_PLATFORM_ACCOUNT_ID"
    Description: >
      The AWS Account ID of the Strata platform. Do NOT change this value.
      It restricts role access exclusively to the Strata control plane.
    AllowedPattern: "[0-9]{12}"
    ConstraintDescription: Must be a valid 12-digit AWS Account ID.

  StrataProvisionerRoleName:
    Type: String
    Default: "strata-provisioner-worker"
    Description: >
      The name of the IAM role in the Strata platform account that will assume
      the provisioner role. This is the IRSA role for the provisioner-worker
      k8s ServiceAccount.

  StrataReaderRoleName:
    Type: String
    Default: "strata-status-poller"
    Description: >
      The name of the IAM role in the Strata platform account that will assume
      the reader role. This is the IRSA role for the status-poller k8s ServiceAccount.

Resources:

  # ── Role 1: Provisioner ───────────────────────────────────────────────────
  # Assumed by Strata's provisioner-worker (Go k8s Job) during Terraform
  # apply/destroy. Grants scoped-down permissions (see policies/provisioner.json)
  # covering only the actions the EKS module needs.
  StrataPlatformProvisioner:
    Type: AWS::IAM::Role
    Properties:
      RoleName: strata-platform-provisioner
      Description: "Assumed by Strata provisioner-worker to run Terraform in this account"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: TrustStrataProvisioner
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${StrataAccountId}:role/${StrataProvisionerRoleName}"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                # ExternalId prevents confused-deputy attacks.
                # provisioner-worker sends this value via --external-id in sts:assume_role.
                sts:ExternalId: "strata-provisioner-v1"
      Policies:
        - PolicyName: strata-provisioner-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # EKS — full control (create, update, delete clusters and node groups)
              - Sid: EKSFull
                Effect: Allow
                Action:
                  - eks:*
                Resource: "*"

              # EC2 — VPC, subnets, NAT gateways, route tables, IGWs, security groups
              - Sid: EC2Networking
                Effect: Allow
                Action:
                  - ec2:*
                Resource: "*"

              # IAM — pass roles to EKS, create service-linked roles
              - Sid: IAMForEKS
                Effect: Allow
                Action:
                  - iam:CreateServiceLinkedRole
                  - iam:GetRole
                  - iam:PassRole
                  - iam:ListAttachedRolePolicies
                  - iam:CreateRole
                  - iam:AttachRolePolicy
                  - iam:PutRolePolicy
                  - iam:TagRole
                Resource: "*"

              # STS — verify caller identity (used by Strata onboarding check)
              - Sid: STSAssumeRoleVerify
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"

              # CloudWatch Logs — create log groups for EKS
              - Sid: CloudWatchLogsForEKS
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:DescribeLogGroups
                  - logs:DeleteLogGroup
                Resource: "*"

      Tags:
        - Key: managed-by
          Value: strata-platform
        - Key: version
          Value: v2

  # ── Role 2: Reader ────────────────────────────────────────────────────────
  # Assumed by Strata's status-poller to read cluster status and logs.
  # Read-only: EKS describe, CloudWatch metrics, CloudWatch Logs for EKS.
  StrataPlatformReader:
    Type: AWS::IAM::Role
    Properties:
      RoleName: strata-platform-reader
      Description: "Assumed by Strata status-poller to read cluster status and logs"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: TrustStrataReader
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${StrataAccountId}:role/${StrataReaderRoleName}"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: "strata-reader-v1"
      Policies:
        - PolicyName: strata-reader-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:

              # EKS — describe clusters and node groups (no write permissions)
              - Sid: EKSRead
                Effect: Allow
                Action:
                  - eks:DescribeCluster
                  - eks:ListClusters
                  - eks:DescribeNodegroup
                  - eks:ListNodegroups
                Resource: "*"

              # CloudWatch Metrics — Container Insights (CPU, memory, network)
              - Sid: CloudWatchMetrics
                Effect: Allow
                Action:
                  - cloudwatch:GetMetricStatistics
                  - cloudwatch:GetMetricData
                  - cloudwatch:ListMetrics
                Resource: "*"

              # CloudWatch Logs — EKS cluster log groups only (scoped by ARN)
              - Sid: CloudWatchLogs
                Effect: Allow
                Action:
                  - logs:FilterLogEvents
                  - logs:GetLogEvents
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource:
                  - !Sub "arn:aws:logs:*:${AWS::AccountId}:log-group:/aws/eks/*"
                  - !Sub "arn:aws:logs:*:${AWS::AccountId}:log-group:/aws/eks/*:*"

      Tags:
        - Key: managed-by
          Value: strata-platform
        - Key: version
          Value: v2

Outputs:

  ProvisionerRoleArn:
    Description: ARN of the provisioner role
    Value: !GetAtt StrataPlatformProvisioner.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ProvisionerRoleArn"

  ReaderRoleArn:
    Description: ARN of the reader role
    Value: !GetAtt StrataPlatformReader.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ReaderRoleArn"

  StackStatus:
    Description: Confirmation message shown in Strata app after stack creation
    Value: "Strata IAM roles deployed successfully. Return to the Strata app and verify."
