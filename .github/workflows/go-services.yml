name: Go Microservices CI/CD

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'accio/services/*-service/**'
      - '.github/workflows/go-services.yml'

jobs:
  build-test-lint-scan-deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: 
          - auth-service
          - audit-service
          - catalog-service
          - provisioner-service
          - scorecard-service
          - workflow-service
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        
    - name: Run Linter
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
        working-directory: accio/services/${{ matrix.service }}
        args: --timeout=5m
        
    - name: Run Tests
      working-directory: accio/services/${{ matrix.service }}
      run: go test -v ./...
      
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: 'accio/services/${{ matrix.service }}'
        format: 'table'
        exit-code: '0'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: Configure AWS credentials
      if: github.ref == 'refs/heads/main'
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      if: github.ref == 'refs/heads/main'
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and Push to ECR 
      if: github.ref == 'refs/heads/main' && matrix.service != 'shared'
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: accio/${{ matrix.service }}
        IMAGE_TAG: ${{ github.sha }}
      working-directory: accio/services/${{ matrix.service }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
  