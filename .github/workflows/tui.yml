name: TUI CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'tui/**'
      - '.github/workflows/tui.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tui

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Ruff lint
        run: uv run ruff check strata_tui tests

      - name: Pytest
        run: uv run pytest