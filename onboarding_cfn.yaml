AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Strata Platform — Cross-account IAM roles for Observatory cluster provisioning.
  Deploy this stack exactly once in your AWS account. It creates two IAM roles
  that allow the Strata platform to provision and monitor EKS clusters on your
  behalf. No IAM users or long-lived access keys are created.

Parameters:
  StrataAccountId:
    Type: String
    Default: "STRATA_PLATFORM_ACCOUNT_ID"
    Description: >
      The AWS Account ID of the Strata platform. Do NOT change this value.
      It restricts role access exclusively to the Strata control plane.
    AllowedPattern: "[0-9]{12}"
    ConstraintDescription: Must be a valid 12-digit AWS Account ID.

Resources:

  # ── Role 1: Provisioner ───────────────────────────────────────────────────
  # Assumed by Strata's CodeBuild role during Terraform apply/destroy.
  # Grants AdministratorAccess so Terraform can create EKS, VPC, IAM, EC2.
  # Will be scoped down to a least-privilege policy in v2 (issue STRATA-88).
  StrataPlatformProvisioner:
    Type: AWS::IAM::Role
    Properties:
      RoleName: strata-platform-provisioner
      Description: "Assumed by Strata CodeBuild to run Terraform in this account"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: TrustStrataCodeBuild
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${StrataAccountId}:role/strata-codebuild-role"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                # ExternalId prevents confused-deputy attacks.
                # CodeBuild sends this value via --external-id in sts:assume_role.
                sts:ExternalId: "strata-provisioner-v1"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess
      Tags:
        - Key: managed-by
          Value: strata-platform
        - Key: version
          Value: v1

  # ── Role 2: Reader ────────────────────────────────────────────────────────
  # Assumed by Strata's Lambda functions to read cluster status and logs.
  # Read-only: EKS describe, CloudWatch metrics, CloudWatch Logs for EKS.
  StrataPlatformReader:
    Type: AWS::IAM::Role
    Properties:
      RoleName: strata-platform-reader
      Description: "Assumed by Strata Lambda to read cluster status and logs"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: TrustStrataLambda
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${StrataAccountId}:role/strata-lambda-role"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: "strata-reader-v1"
      Policies:
        - PolicyName: strata-reader-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:

              # EKS — describe clusters and node groups (no write permissions)
              - Sid: EKSRead
                Effect: Allow
                Action:
                  - eks:DescribeCluster
                  - eks:ListClusters
                  - eks:DescribeNodegroup
                  - eks:ListNodegroups
                Resource: "*"

              # CloudWatch Metrics — Container Insights (CPU, memory, network)
              - Sid: CloudWatchMetrics
                Effect: Allow
                Action:
                  - cloudwatch:GetMetricStatistics
                  - cloudwatch:GetMetricData
                  - cloudwatch:ListMetrics
                Resource: "*"

              # CloudWatch Logs — EKS cluster log groups only (scoped by ARN)
              - Sid: CloudWatchLogs
                Effect: Allow
                Action:
                  - logs:FilterLogEvents
                  - logs:GetLogEvents
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource:
                  - !Sub "arn:aws:logs:*:${AWS::AccountId}:log-group:/aws/eks/*"
                  - !Sub "arn:aws:logs:*:${AWS::AccountId}:log-group:/aws/eks/*:*"

      Tags:
        - Key: managed-by
          Value: strata-platform
        - Key: version
          Value: v1

Outputs:

  ProvisionerRoleArn:
    Description: ARN of the provisioner role
    Value: !GetAtt StrataPlatformProvisioner.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ProvisionerRoleArn"

  ReaderRoleArn:
    Description: ARN of the reader role
    Value: !GetAtt StrataPlatformReader.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ReaderRoleArn"

  StackStatus:
    Description: Confirmation message shown in Observatory app after stack creation
    Value: "Strata IAM roles deployed successfully. Return to the Observatory app and tap Verify Setup."
