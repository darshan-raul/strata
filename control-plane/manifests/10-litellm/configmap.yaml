apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: strata
  labels:
    app: litellm
    app.kubernetes.io/part-of: strata
data:
  config.yaml: |
    model_list:
      - model_name: nova-pro
        litellm_params:
          model: bedrock/amazon.nova-pro-v1:0
          aws_region_name: us-east-1
      - model_name: titan-embed-v2
        litellm_params:
          model: bedrock/amazon.titan-embed-text-v2:0
          aws_region_name: us-east-1

    router_settings:
      num_retries: 2
      timeout: 60

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
