apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: strata
  labels:
    app: litellm
    app.kubernetes.io/part-of: strata
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
        app.kubernetes.io/part-of: strata
    spec:
      serviceAccountName: litellm
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-stable
          imagePullPolicy: IfNotPresent
          args:
            - --config=/etc/litellm/config.yaml
            - --port=4000
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: litellm-aws-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-aws-credentials
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: litellm-aws-credentials
                  key: AWS_REGION
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-aws-credentials
                  key: LITELLM_MASTER_KEY
          volumeMounts:
            - name: config
              mountPath: /etc/litellm
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health/liveliness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: litellm-config
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: litellm
  namespace: strata
  labels:
    app: litellm
    app.kubernetes.io/part-of: strata
