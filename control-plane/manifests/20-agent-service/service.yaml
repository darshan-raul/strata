apiVersion: v1
kind: Service
metadata:
  name: agent-service
  namespace: strata
  labels:
    app: agent-service
    app.kubernetes.io/part-of: strata
spec:
  type: NodePort
  selector:
    app: agent-service
  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 30800
      protocol: TCP
