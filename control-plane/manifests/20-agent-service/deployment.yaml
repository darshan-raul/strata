apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-service
  namespace: strata
  labels:
    app: agent-service
    app.kubernetes.io/part-of: strata
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-service
  template:
    metadata:
      labels:
        app: agent-service
        app.kubernetes.io/part-of: strata
    spec:
      serviceAccountName: agent-service
      containers:
        - name: agent-service
          image: localhost:5000/strata-agent-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: LITELLM_BASE_URL
              value: http://litellm:4000
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-aws-credentials
                  key: LITELLM_MASTER_KEY
            - name: MODEL_NAME
              value: nova-pro
            - name: LOG_LEVEL
              value: INFO
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-service
  namespace: strata
  labels:
    app: agent-service
    app.kubernetes.io/part-of: strata
