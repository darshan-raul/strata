static_resources:
  listeners:
    - name: listener_api
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 80
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: api
                cors:
                  allow_origin_string_match:
                    - prefix: "*"
                  allow_methods: GET, POST, PUT, DELETE, PATCH, OPTIONS
                  allow_headers: authorization,content-type
                  expose_headers: "*"
                route_config:
                  virtual_hosts:
                    - name: api_service
                      domains: ["api.accio.io", "api.accio.localhost"]
                      routes:
                        - match: { prefix: "/catalog" }
                          route: { cluster: catalog_service }
                        - match: { prefix: "/auth" }
                          route: { cluster: auth_service }
                        - match: { prefix: "/provisioner" }
                          route: { cluster: provisioner_service }
                        - match: { prefix: "/scorecard" }
                          route: { cluster: scorecard_service }
                        - match: { prefix: "/workflow" }
                          route: { cluster: workflow_service }
                        - match: { prefix: "/audit" }
                          route: { cluster: audit_service }
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
            - name: listener_portal
              address:
                socket_address:
                  address: 0.0.0.0
                  port_value: 8080
              filter_chains:
                - filters:
                    - name: envoy.filters.network.http_connection_manager
                      typed_config:
                        "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                        stat_prefix: portal
                        route_config:
                          virtual_hosts:
                            - name: portal_service
                              domains: ["portal.accio.io", "portal.accio.localhost", "localhost"]
                              routes:
                                - match: { prefix: "/" }
                                  route: { cluster: portal_ui }
                        http_filters:
                          - name: envoy.filters.http.router
                            typed_config:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: catalog_service
      connect_timeout: 5s
      type: strict_dns
      lb_policy: round_robin
      load_assignment:
        cluster_name: catalog_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: catalog-service
                      port_value: 8081
    - name: auth_service
      connect_timeout: 5s
      type: strict_dns
      lb_policy: round_robin
      load_assignment:
        cluster_name: auth_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: auth-service
                      port_value: 8086
    - name: provisioner_service
      connect_timeout: 5s
      type: strict_dns
      lb_policy: round_robin
      load_assignment:
        cluster_name: provisioner_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: provisioner-service
                      port_value: 8082
    - name: scorecard_service
      connect_timeout: 5s
      type: strict_dns
      lb_policy: round_robin
      load_assignment:
        cluster_name: scorecard_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: scorecard-service
                      port_value: 8083
    - name: workflow_service
      connect_timeout: 5s
      type: strict_dns
      lb_policy: round_robin
      load_assignment:
        cluster_name: workflow_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: workflow-engine
                      port_value: 8084
    - name: audit_service
      connect_timeout: 5s
      type: strict_dns
      lb_policy: round_robin
      load_assignment:
        cluster_name: audit_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: audit-service
                      port_value: 8085
    - name: portal_ui
      connect_timeout: 5s
      type: strict_dns
      lb_policy: round_robin
      load_assignment:
        cluster_name: portal_ui
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: portal-ui
                      port_value: 3000