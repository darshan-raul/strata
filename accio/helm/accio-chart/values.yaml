namespace: accio

global:
  imagePullPolicy: IfNotPresent
  imageTag: latest

ingress:
  enabled: false
  className: ""
  annotations: {}

postgres:
  replicaCount: 1
  image:
    repository: postgres
    tag: "15-alpine"
  resources:
    limits:
      cpu: "0.5"
      memory: 256Mi
    requests:
      cpu: "0.1"
      memory: 128Mi
  storage: 1Gi
  env:
    user: accio
    database: accio
    password: accio_password

redis:
  replicaCount: 1
  image:
    repository: redis
    tag: "7-alpine"
  resources:
    limits:
      cpu: "0.5"
      memory: 256Mi
    requests:
      cpu: "0.1"
      memory: 64Mi

nats:
  replicaCount: 1
  image:
    repository: nats
    tag: "2.10-alpine"
  resources:
    limits:
      cpu: "0.5"
      memory: 256Mi
    requests:
      cpu: "0.1"
      memory: 128Mi

authService:
  replicaCount: 1
  image:
    repository: auth-service
    tag: latest
  resources:
    limits:
      cpu: "0.5"
      memory: 256Mi
    requests:
      cpu: "0.1"
      memory: 64Mi

catalogService:
  replicaCount: 1
  image:
    repository: catalog-service
    tag: latest
  service:
    port: 8081
  resources:
    limits:
      cpu: "0.5"
      memory: 256Mi
    requests:
      cpu: "0.1"
      memory: 64Mi

provisionerService:
