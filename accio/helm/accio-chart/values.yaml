  image:
    repository: provisioner-service
    tag: latest
  service:
    port: 8082
  resources:
    limits:
      cpu: "0.5"
      memory: 256Mi
    requests:
      cpu: "0.1"
      memory: 64Mi

scorecardService:
  replicaCount: 1
  image:
    repository: scorecard-service
    tag: latest
  service:
    port: 8083
  resources:
    limits:
      cpu: "0.5"
      memory: 256Mi
    requests:
      cpu: "0.1"
      memory: 64Mi

workflowEngine:
  replicaCount: 1
  image:
    repository: workflow-engine
    tag: latest
  service:
    port: 8084
  resources:
    limits:
      cpu: "0.5"
      memory: 256Mi
    requests:
      cpu: "0.1"
      memory: 64Mi

auditService:
  replicaCount: 1
  image:
    repository: audit-service
    tag: latest
  service:
    port: 8085
  resources:
    limits:
      cpu: "0.5"
      memory: 256Mi
    requests:
