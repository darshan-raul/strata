apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: {{ include "accio.namespace" . }}
  labels:
    {{- include "accio.labels" . | nindent 4 }}
spec:
  serviceName: nats-headless
  replicas: {{ .Values.nats.replicaCount }}
  selector:
    matchLabels:
      {{- include "accio.selectorLabels" . | nindent 6 }}
      component: nats
  template:
    metadata:
      labels:
        {{- include "accio.selectorLabels" . | nindent 8 }}
        component: nats
    spec:
      containers:
        - name: nats
          image: "{{ .Values.nats.image.repository }}:{{ .Values.nats.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          args: ["-js"]
          ports:
            - containerPort: 4222
              name: client
            - containerPort: 8222
              name: monitoring
          resources:
            {{- toYaml .Values.nats.resources | nindent 10 }}