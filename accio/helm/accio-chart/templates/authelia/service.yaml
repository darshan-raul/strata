apiVersion: v1
kind: Service
metadata:
  name: authelia
  namespace: {{ include "accio.namespace" . }}
  labels:
    {{- include "accio.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 9091
      targetPort: 9091
  selector:
    {{- include "accio.selectorLabels" . | nindent 4 }}
    component: authelia