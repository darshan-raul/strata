apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: {{ include "accio.namespace" . }}
spec:
  clusterIP: None
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    app: redis
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: {{ include "accio.namespace" . }}
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: redis