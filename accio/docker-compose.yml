networks:
  accio-net:
    driver: bridge

volumes:
  postgres_data:

x-go-service: &go-service
  restart: on-failure
  networks:
    - accio-net
  deploy:
    resources:
      limits:
        cpus: '0.5'
        memory: 256M

services:

  # ── Infrastructure ────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: accio
      POSTGRES_PASSWORD: accio_password
      POSTGRES_DB: accio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/init-db:/docker-entrypoint-initdb.d
    networks:
      - accio-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accio"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    networks:
      - accio-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2.10-alpine
    command: "-js"
    restart: always
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - accio-net

  auth-service:
    build:
      context: ./services/auth-service
    ports:
      - "8086:8086"
    networks:
      - accio-net

  # ── Custom Microservices ──────────────────────────────────────

  catalog-service:
    <<: *go-service
    build:
      context: ./services/catalog-service
    ports:
      - "8081:8081"
    environment:
      - DB_DSN=postgres://accio:accio_password@postgres:5432/accio?sslmode=disable
      - NATS_URL=nats://nats:4222
      - PORT=8081
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    develop:
      watch:
        - action: rebuild
          path: ./services/catalog-service/

  provisioner-service:
    <<: *go-service
    build:
      context: ./services/provisioner-service
    ports:
      - "8082:8082"
    environment:
      - DB_DSN=postgres://accio:accio_password@postgres:5432/accio?sslmode=disable
      - NATS_URL=nats://nats:4222
      - PORT=8082
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    develop:
      watch:
        - action: rebuild
          path: ./services/provisioner-service/

  scorecard-service:
    <<: *go-service
    build:
      context: ./services/scorecard-service
    ports:
      - "8083:8083"
    environment:
      - DB_DSN=postgres://accio:accio_password@postgres:5432/accio?sslmode=disable
      - NATS_URL=nats://nats:4222
      - PORT=8083
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    develop:
      watch:
        - action: rebuild
          path: ./services/scorecard-service/

  workflow-engine:
    <<: *go-service
    build:
      context: ./services/workflow-engine
    ports:
      - "8084:8084"
    environment:
      - DB_DSN=postgres://accio:accio_password@postgres:5432/accio?sslmode=disable
      - NATS_URL=nats://nats:4222
      - REDIS_ADDR=redis:6379
      - PORT=8084
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      redis:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: ./services/workflow-engine/

  audit-service:
    <<: *go-service
    build:
      context: ./services/audit-service
    ports:
      - "8085:8085"
    environment:
      - DB_DSN=postgres://accio:accio_password@postgres:5432/accio?sslmode=disable
      - NATS_URL=nats://nats:4222
      - PORT=8085
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    develop:
      watch:
        - action: rebuild
          path: ./services/audit-service/

  # ── Frontend ─────────────────────────────────────────────────

  portal-ui:
    <<: *go-service
    build:
      context: ./services/portal-ui
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
    environment:
      - VITE_CATALOG_URL=http://localhost:8081
      - VITE_PROVISIONER_URL=http://localhost:8082
      - VITE_SCORECARD_URL=http://localhost:8083
      - VITE_WORKFLOW_URL=http://localhost:8084
      - VITE_AUDIT_URL=http://localhost:8085
      - VITE_AUTH_URL=http://localhost:8086
    develop:
      watch:
        - action: sync
          path: ./services/portal-ui/src
          target: /app/src
        - action: rebuild
          path: ./services/portal-ui/package.json
