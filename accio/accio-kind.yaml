kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: accio
nodes:
- role: control-plane
  extraPortMappings:
  - containerPort: 30000
    hostPort: 3000
    protocol: TCP
  - containerPort: 30991
    hostPort: 9091
    protocol: TCP
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      imageRepository: localhost:5000
      imagePullPolicy: IfNotPresent