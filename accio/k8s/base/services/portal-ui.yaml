apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal-ui
  namespace: accio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portal-ui
  template:
    metadata:
      labels:
        app: portal-ui
    spec:
      containers:
        - name: portal-ui
          image: portal-ui:latest
          ports:
            - containerPort: 3000
          env:
            - name: VITE_CATALOG_URL
              value: "http://catalog-service:8081"
            - name: VITE_PROVISIONER_URL
              value: "http://provisioner-service:8082"
            - name: VITE_SCORECARD_URL
              value: "http://scorecard-service:8083"
            - name: VITE_WORKFLOW_URL
              value: "http://workflow-engine:8084"
            - name: VITE_AUDIT_URL
              value: "http://audit-service:8085"
            - name: VITE_AUTH_URL
              value: "http://localhost:9091"
          resources:
            limits:
              cpu: "0.5"
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: portal-ui
  namespace: accio
spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000
  selector:
    app: portal-ui