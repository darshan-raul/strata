apiVersion: v1
kind: Namespace
metadata:
  name: accio
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: accio
data:
  POSTGRES_USER: "accio"
  POSTGRES_DB: "accio"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: accio
type: Opaque
stringData:
  POSTGRES_PASSWORD: "accio_password"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: init-db-config
  namespace: accio
data:
  01-schema.sql: |
    -- ============================================================
    -- Accio IDP Simulation Schema
    -- ============================================================

    -- CATALOG SERVICE
    CREATE TABLE IF NOT EXISTS catalog_services (
        id          UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        name        VARCHAR(255) NOT NULL UNIQUE,
        description TEXT,
        team_id     UUID,
        language    VARCHAR(50),
        repo_url    VARCHAR(500),
        lifecycle   VARCHAR(50)  NOT NULL DEFAULT 'experimental',
        type        VARCHAR(50)  NOT NULL DEFAULT 'service',
        has_docs        BOOLEAN NOT NULL DEFAULT FALSE,
        has_slo         BOOLEAN NOT NULL DEFAULT FALSE,
        has_api_spec    BOOLEAN NOT NULL DEFAULT FALSE,
        has_monitoring  BOOLEAN NOT NULL DEFAULT FALSE,
        created_at  TIMESTAMP NOT NULL DEFAULT NOW(),
        updated_at  TIMESTAMP NOT NULL DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS catalog_teams (
        id            UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        name          VARCHAR(255) NOT NULL UNIQUE,
        email         VARCHAR(255),
        slack_channel VARCHAR(100),
        created_at    TIMESTAMP NOT NULL DEFAULT NOW()
    );

    -- PROVISIONER SERVICE
    CREATE TABLE IF NOT EXISTS provision_requests (
        id            UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        name          VARCHAR(255) NOT NULL,
        resource_type VARCHAR(100) NOT NULL,
        environment   VARCHAR(50)  NOT NULL,
        requester     VARCHAR(255),
        status        VARCHAR(50)  NOT NULL DEFAULT 'pending',
        error_message TEXT,
        created_at    TIMESTAMP NOT NULL DEFAULT NOW(),
        updated_at    TIMESTAMP NOT NULL DEFAULT NOW()
    );

    -- SCORECARD SERVICE
    CREATE TABLE IF NOT EXISTS scorecards (
        id              UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        service_id      UUID NOT NULL UNIQUE,
        service_name    VARCHAR(255),
        docs_score      INTEGER NOT NULL DEFAULT 0,
        security_score  INTEGER NOT NULL DEFAULT 0,
        reliability_score INTEGER NOT NULL DEFAULT 0,
        ownership_score INTEGER NOT NULL DEFAULT 0,
        total_score     INTEGER NOT NULL DEFAULT 0,
        grade           CHAR(1) NOT NULL DEFAULT 'F',
        evaluated_at    TIMESTAMP NOT NULL DEFAULT NOW()
    );

    -- WORKFLOW ENGINE
    CREATE TABLE IF NOT EXISTS workflows (
        id           UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        name         VARCHAR(255) NOT NULL,
        type         VARCHAR(100) NOT NULL,
        status       VARCHAR(50)  NOT NULL DEFAULT 'pending',
        entity_id    VARCHAR(255),
        entity_type  VARCHAR(100),
        current_step INTEGER NOT NULL DEFAULT 0,
        total_steps  INTEGER NOT NULL DEFAULT 0,
        created_at   TIMESTAMP NOT NULL DEFAULT NOW(),
        updated_at   TIMESTAMP NOT NULL DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS workflow_steps (
        id           UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        workflow_id  UUID NOT NULL REFERENCES workflows(id) ON DELETE CASCADE,
        step_number  INTEGER NOT NULL,
        name         VARCHAR(255) NOT NULL,
        status       VARCHAR(50)  NOT NULL DEFAULT 'pending',
        output       TEXT,
        started_at   TIMESTAMP,
        completed_at TIMESTAMP
    );

    -- AUDIT SERVICE
    CREATE TABLE IF NOT EXISTS audit_events (
        id          UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        event_type  VARCHAR(255) NOT NULL,
        entity_type VARCHAR(100),
        entity_id   VARCHAR(255),
        actor       VARCHAR(255) NOT NULL DEFAULT 'system',
        summary     TEXT,
        created_at  TIMESTAMP NOT NULL DEFAULT NOW()
    );

    -- Seed some catalog teams
    INSERT INTO catalog_teams (name, email, slack_channel) VALUES
        ('platform-team',   'platform@accio.dev',   '#platform'),
        ('backend-team',    'backend@accio.dev',    '#backend'),
        ('frontend-team',   'frontend@accio.dev',   '#frontend'),
        ('data-team',       'data@accio.dev',       '#data-eng'),
        ('security-team',   'security@accio.dev',   '#security')
    ON CONFLICT (name) DO NOTHING;

    -- Seed catalog services
    INSERT INTO catalog_services (name, description, language, lifecycle, type, has_docs, has_slo, has_api_spec, has_monitoring) VALUES
        ('user-service',     'Manages user accounts and profiles',    'Go',     'production',   'service', true,  true,  true,  true),
        ('order-service',    'Handles order lifecycle management',    'Java',   'production',   'service', true,  true,  false, true),
        ('payment-gateway',  'Payment processing integrations',       'Node',   'production',   'service', true,  true,  true,  true),
        ('report-builder',   'Async report generation service',       'Python', 'beta',         'service', false, false, false, true),
        ('mobile-bff',       'Backend for frontend – mobile apps',    'Go',     'production',   'service', true,  false, true,  false),
        ('data-exporter',    'Exports data to S3/GCS pipelines',      'Python', 'experimental', 'service', false, false, false, false),
        ('admin-dashboard',  'Internal admin React application',       'JS',     'production',   'website', true,  false, false, true),
        ('shared-lib-proto', 'Shared protobuf schema definitions',    'Proto',  'production',   'library', true,  false, true,  false)
    ON CONFLICT (name) DO NOTHING;
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: accio
spec:
  serviceName: postgres-headless
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_DB
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-db
              mountPath: /docker-entrypoint-initdb.d
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "accio"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "accio"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            limits:
              cpu: "0.5"
              memory: 256Mi
      volumes:
        - name: init-db
          configMap:
            name: init-db-config
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: accio
spec:
  clusterIP: None
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: accio
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: postgres