version: 0.2

phases:
  install:
    commands:
      - echo "Installing Terraform..."
      - wget https://releases.hashicorp.com/terraform/1.8.0/terraform_1.8.0_linux_amd64.zip
      - unzip terraform_1.8.0_linux_amd64.zip
      - mv terraform /usr/local/bin/
      - terraform version
  pre_build:
    commands:
      - echo "Downloading terraform module from S3..."
      - aws s3 cp s3://$TF_CODE_BUCKET/terraform-aws.zip /tmp/terraform-aws.zip
      - unzip /tmp/terraform-aws.zip -d /tmp/terraform-aws
  build:
    commands:
      - set -e
      - trap 'aws stepfunctions send-task-failure --task-token "$TASK_TOKEN" --error "TerraformApplyFailed" --cause "Terraform apply failed"' ERR
      - cd /tmp/terraform-aws
      - echo "Initializing Terraform..."
      - terraform init -backend-config="bucket=$TF_STATE_BUCKET" -backend-config="key=clusters/$CLUSTER_ID/terraform.tfstate" -backend-config="region=$REGION"
      - echo "Applying Terraform..."
      - terraform apply -auto-approve -var="cluster_id=$CLUSTER_ID" -var="cluster_name=$CLUSTER_NAME" -var="aws_account_id=$AWS_ACCOUNT_ID" -var="region=$REGION" -var="instance_type=$INSTANCE_TYPE" -var="customer_role_arn=arn:aws:iam::$AWS_ACCOUNT_ID:role/Strata-platform-provisioner" -var="external_id=Strata-provisioner-v1"
  post_build:
    commands:
      - set -e
      - cd /tmp/terraform-aws
      - echo "Extracting Terraform outputs..."
      - terraform output -json > /tmp/outputs.json
      - aws s3 cp /tmp/outputs.json s3://$OUTPUTS_BUCKET/clusters/$CLUSTER_ID/outputs.json
      - CLUSTER_ENDPOINT=$(jq -r '.cluster_endpoint.value' /tmp/outputs.json)
      - echo "Sending task success to Step Functions..."
      - OUTPUT=$(jq -n --arg ep "$CLUSTER_ENDPOINT" '{cluster_endpoint: $ep}')
      - aws stepfunctions send-task-success --task-token "$TASK_TOKEN" --output "$OUTPUT"
