networks:
  Strata-net:
    driver: bridge

volumes:
  postgres_data:

x-go-service: &go-service
  restart: on-failure
  networks:
    - Strata-net
  deploy:
    resources:
      limits:
        cpus: '0.5'
        memory: 256M

services:

  # ── Infrastructure ────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: Strata
      POSTGRES_PASSWORD: strata_password
      POSTGRES_DB: Strata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/init-db:/docker-entrypoint-initdb.d
    networks:
      - Strata-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U Strata"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    networks:
      - Strata-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2.10-alpine
    command: "-js"
    restart: always
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - Strata-net

  envoy-gateway:
    image: envoyproxy/envoy:v1.30
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
    networks:
      - Strata-net

  auth-service:
    build:
      context: ./services/auth-service
    networks:
      - Strata-net

  # ── Custom Microservices ──────────────────────────────────────

  catalog-service:
    <<: *go-service
    build:
      context: ./services/catalog-service
    environment:
      - DB_DSN=postgres://Strata:strata_password@postgres:5432/Strata?sslmode=disable
      - NATS_URL=nats://nats:4222
      - PORT=8081
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    develop:
      watch:
        - action: rebuild
          path: ./services/catalog-service/

  provisioner-service:
    <<: *go-service
    build:
      context: ./services/provisioner-service
    environment:
      - DB_DSN=postgres://Strata:strata_password@postgres:5432/Strata?sslmode=disable
      - NATS_URL=nats://nats:4222
      - PORT=8082
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    develop:
      watch:
        - action: rebuild
          path: ./services/provisioner-service/

  scorecard-service:
    <<: *go-service
    build:
      context: ./services/scorecard-service
    environment:
      - DB_DSN=postgres://Strata:strata_password@postgres:5432/Strata?sslmode=disable
      - NATS_URL=nats://nats:4222
      - PORT=8083
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    develop:
      watch:
        - action: rebuild
          path: ./services/scorecard-service/

  workflow-engine:
    <<: *go-service
    build:
      context: ./services/workflow-engine
    environment:
      - DB_DSN=postgres://Strata:strata_password@postgres:5432/Strata?sslmode=disable
      - NATS_URL=nats://nats:4222
      - REDIS_ADDR=redis:6379
      - PORT=8084
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      redis:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: ./services/workflow-engine/

  audit-service:
    <<: *go-service
    build:
      context: ./services/audit-service
    environment:
      - DB_DSN=postgres://Strata:strata_password@postgres:5432/Strata?sslmode=disable
      - NATS_URL=nats://nats:4222
      - PORT=8085
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    develop:
      watch:
        - action: rebuild
          path: ./services/audit-service/

  # ── Frontend ─────────────────────────────────────────────────

  portal-ui:
    <<: *go-service
    build:
      context: ./services/portal-ui
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - envoy-gateway
    environment:
      - VITE_CATALOG_URL=http://envoy-gateway:80/catalog
      - VITE_PROVISIONER_URL=http://envoy-gateway:80/provisioner
      - VITE_SCORECARD_URL=http://envoy-gateway:80/scorecard
      - VITE_WORKFLOW_URL=http://envoy-gateway:80/workflow
      - VITE_AUDIT_URL=http://envoy-gateway:80/audit
      - VITE_AUTH_URL=http://envoy-gateway:80/auth
    develop:
      watch:
        - action: sync
          path: ./services/portal-ui/src
          target: /app/src
        - action: rebuild
          path: ./services/portal-ui/package.json
