apiVersion: apps/v1
kind: Deployment
metadata:
  name: scorecard-service
  namespace: Strata
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scorecard-service
  template:
    metadata:
      labels:
        app: scorecard-service
    spec:
      containers:
        - name: scorecard-service
          image: scorecard-service:latest
          ports:
            - containerPort: 8083
          env:
            - name: DB_DSN
              value: "postgres://strata:strata_password@postgres:5432/strata?sslmode=disable"
            - name: NATS_URL
              value: "nats://nats:4222"
            - name: PORT
              value: "8083"
          resources:
            limits:
              cpu: "0.5"
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: scorecard-service
  namespace: Strata
spec:
  type: ClusterIP
  ports:
    - port: 8083
      targetPort: 8083
  selector:
    app: scorecard-service