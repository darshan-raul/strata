apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: Strata
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
        - name: catalog-service
          image: catalog-service:latest
          ports:
            - containerPort: 8081
          env:
            - name: DB_DSN
              value: "postgres://Strata:accio_password@postgres:5432/Strata?sslmode=disable"
            - name: NATS_URL
              value: "nats://nats:4222"
            - name: PORT
              value: "8081"
          resources:
            limits:
              cpu: "0.5"
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: Strata
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8081
  selector:
    app: catalog-service