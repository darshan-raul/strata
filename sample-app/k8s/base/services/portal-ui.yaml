apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal-ui
  namespace: Strata
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portal-ui
  template:
    metadata:
      labels:
        app: portal-ui
    spec:
      containers:
        - name: portal-ui
          image: portal-ui:latest
          ports:
            - containerPort: 3000
          env:
            - name: VITE_CATALOG_URL
              value: "http://envoy-gateway:80/catalog"
            - name: VITE_PROVISIONER_URL
              value: "http://envoy-gateway:80/provisioner"
            - name: VITE_SCORECARD_URL
              value: "http://envoy-gateway:80/scorecard"
            - name: VITE_WORKFLOW_URL
              value: "http://envoy-gateway:80/workflow"
            - name: VITE_AUDIT_URL
              value: "http://envoy-gateway:80/audit"
            - name: VITE_AUTH_URL
              value: "http://envoy-gateway:80/auth"
          resources:
            limits:
              cpu: "0.5"
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: portal-ui
  namespace: Strata
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: portal-ui